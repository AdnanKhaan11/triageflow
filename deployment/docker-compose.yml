version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    container_name: triageflow-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: triageflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped