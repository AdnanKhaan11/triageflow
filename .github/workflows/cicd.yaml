name: TriageFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new push arrives
# Prevents wasted CI minutes on outdated commits
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # JOB 1: Code Quality
  # Runs on every push and PR — fast feedback on style issues
  # ============================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linting tools
        run: pip install ruff black

      # ruff catches real bugs and bad patterns (unused imports,
      # undefined variables, etc) — not just style
      - name: Run ruff linter
        run: ruff check backend/ --output-format=github

      # black checks formatting — fails if any file would be reformatted
      - name: Run black formatter check
        run: black backend/ --check --diff

  # ============================================================
  # JOB 2: Tests
  # Runs after lint passes — no point testing unclean code
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Verify imports
        run: python -c "from backend.api.main import app; print('Imports OK')"

      - name: Run tests
        run: pytest tests/ -v --tb=short
        

