<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TriageFlow — Review Queue</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="nav">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo">TF</div>
        <div>
          <div class="nav-title">TRIAGEFLOW</div>
          <div class="nav-subtitle">Industrial Maintenance AI</div>
        </div>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Submit Ticket</a>
        <a href="review.html" class="nav-link active">Review Queue</a>
      </div>
      <div class="nav-right">
        <div class="nav-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Connecting...</span>
        </div>
        <div class="user-avatar" title="John Doe">JD</div>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
          ☀️
        </button>
      </div>
    </nav>

    <!-- Pipeline Status Bar -->
    <div class="pipeline-bar">
      <div class="pipeline-step">
        <span class="step-label completed">Ingest</span>
      </div>
      <span class="step-arrow">→</span>
      <div class="pipeline-step">
        <span class="step-label completed">Classify</span>
      </div>
      <span class="step-arrow">→</span>
      <div class="pipeline-step">
        <span class="step-label completed">Safety Check</span>
      </div>
      <span class="step-arrow">→</span>
      <div class="pipeline-step">
        <span class="step-label completed">Retrieve</span>
      </div>
      <span class="step-arrow">→</span>
      <div class="pipeline-step">
        <span class="step-label completed">Inventory</span>
      </div>
      <span class="step-arrow">→</span>
      <div class="pipeline-step">
        <span class="step-label completed">Draft</span>
      </div>
      <span class="step-arrow">→</span>
      <div class="pipeline-step">
        <span class="step-label active">Human Review</span>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button
        class="tab-btn active"
        id="tab-queue"
        onclick="switchTab('queue')"
      >
        <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor">
          <path
            d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zM4 15a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1z"
          />
        </svg>
        Awaiting Review
        <span class="tab-count" id="queue-count">0</span>
      </button>
      <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
        <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor">
          <path
            d="M10 1a1 1 0 011 1v6h6a1 1 0 110 2h-6v6a1 1 0 11-2 0v-6H3a1 1 0 110-2h6V2a1 1 0 011-1z"
          />
        </svg>
        History
        <span class="tab-count" id="history-count">0</span>
      </button>
    </div>

    <!-- Split Panel Layout -->
    <div class="review-layout">
      <!-- Left: Ticket List -->
      <div class="ticket-list">
        <div class="ticket-list-header">
          <span id="list-heading">Awaiting Review</span>
          <button class="btn-refresh" onclick="refreshCurrentTab()">
            <svg class="refresh-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                clip-rule="evenodd"
              />
            </svg>
            Refresh
          </button>
        </div>
        <div class="ticket-list-body" id="ticket-list-body">
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-title">Loading...</div>
          </div>
        </div>
      </div>

      <!-- Right: Detail Panel -->
      <div class="detail-panel" id="detail-panel">
        <div class="empty-state" style="margin-top: 4rem">
          <svg
            class="empty-state-svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          <div class="empty-state-title">Select a ticket to review</div>
          <div class="empty-state-desc">
            Choose a ticket from the queue on the left.
          </div>
        </div>
      </div>
    </div>

    <!-- Toast notifications - Top positioned -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Activity Feed -->
    <div class="activity-feed" id="activity-feed"></div>

    <script src="api.js"></script>
    <script src="app.js"></script>
  </body>
</html>
