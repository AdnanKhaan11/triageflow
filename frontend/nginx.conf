server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files only
    # API calls go directly from the browser to localhost:8000
    # nginx doesn't need to proxy anything
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|ico|png|jpg)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}